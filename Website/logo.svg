<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 72" fill="none">
  <!-- Icon mark: stylised Q with cart arrow -->
  <rect width="72" height="72" rx="16" fill="#00C832"/>

  <!-- Q shape -->
  <circle cx="36" cy="33" r="14" stroke="white" stroke-width="4" fill="none"/>
  <!-- Q tail -->
  <line x1="45" y1="42" x2="54" y2="52" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Cart dots -->
  <circle cx="28" cy="50" r="2.5" fill="white"/>
  <circle cx="38" cy="50" r="2.5" fill="white"/>
  <!-- Cart basket hint -->
  <polyline points="22,44 24,50 42,50 44,44" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="20" y1="41" x2="24" y2="41" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="88" y="30" font-family="'Syne', 'Arial Black', sans-serif" font-weight="800" font-size="18" fill="#0d0d0d" letter-spacing="-0.5">Queue-it</text>
  <text x="88" y="52" font-family="'DM Sans', 'Arial', sans-serif" font-weight="400" font-size="15" fill="#00C832" letter-spacing="3">RETAIL</text>

  <!-- Tagline rule -->
  <line x1="88" y1="58" x2="255" y2="58" stroke="#e8eaed" stroke-width="1"/>
</svg>
